name: Update Solcast Solar Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-solcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Solcast forecast
        env:
          SOLCAST_API_KEY: ${{ secrets.SOLCAST_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SOLCAST_API_KEY}" ]; then
            echo "Missing SOLCAST_API_KEY" >&2
            exit 1
          fi
          curl -sS -H "Authorization: Bearer ${SOLCAST_API_KEY}" \
            "https://api.solcast.com.au/rooftop_sites/6202-eb4d-032d-dabc/forecasts?format=json" \
            -o data/solcast.json
          cat data/solcast.json

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/zjcolvin/zhuji-solar-pwa.git"
          git add data/solcast.json
          git diff --cached --quiet || git commit -m "chore: update solcast data"
          git push
